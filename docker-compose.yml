services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - BITCOIN_RPC_HOST=${BITCOIN_RPC_HOST:-host.docker.internal}
      - BITCOIN_RPC_PORT=${BITCOIN_RPC_PORT:-38332}
      - BITCOIN_RPC_USER=${BITCOIN_RPC_USER:-lightning}
      - BITCOIN_RPC_PASSWORD=${BITCOIN_RPC_PASSWORD:-lightning}
      - BACKEND_TYPE=${BACKEND_TYPE:-bitcoin_core}
      - ELECTRUM_HOST=${ELECTRUM_HOST:-host.docker.internal}
      - ELECTRUM_PORT=${ELECTRUM_PORT:-50001}
      - ELECTRUM_SSL=${ELECTRUM_SSL:-false}
      - CORS_ORIGINS=["http://localhost","http://localhost:3000","http://localhost:5173","http://localhost:8080"]
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
